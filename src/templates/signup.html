{% extends "base.html" %}

{% block title %}Patient Sign Up{% endblock %}

{% block content %}
<div class="form-box card">
    <h2 class="page-title">Patient Sign Up</h2>
    <p class="page-subtitle">Public signup creates a patient account and patient profile together.</p>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="form-grid">
        <div class="field">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="field">
            <label>Patient Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="field">
            <label>Age</label>
            <input type="number" name="age">
        </div>

        <div class="field">
            <label>Gender</label>
            <input type="text" name="gender">
        </div>

        <div class="field">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>

        <div class="field">
            <label>Address</label>
            <textarea name="address"></textarea>
        </div>

        <div class="field">
            <label>Blood Group</label>
            <input type="text" name="blood_group">
        </div>

        <div class="btn-row">
            <button class="btn btn-green" type="submit">Create Patient Account</button>
            <a class="btn btn-light" href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </form>
</div>
{% endblock %}
