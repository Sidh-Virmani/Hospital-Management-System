<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hospital Management System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
        }

        .brand p {
            margin: 4px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pill {
            background: #eef2ff;
            color: #3730a3;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 28px;
        }

        .page-title {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .page-subtitle {
            margin-top: 0;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
        }

        .card h3, .card h2 {
            margin-top: 0;
        }

        .muted {
            color: #6b7280;
        }

        .section {
            margin-top: 28px;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            background: #2563eb;
            color: white;
        }

        .btn:hover { opacity: 0.92; }

        .btn-secondary {
            background: #374151;
            color: white;
        }

        .btn-light {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-green {
            background: #16a34a;
        }

        .btn-red {
            background: #dc2626;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .action-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: #ffffff;
        }

        .action-card h4 {
            margin: 0 0 8px;
            font-size: 17px;
        }

        .action-card p {
            margin: 0 0 14px;
            color: #6b7280;
            line-height: 1.45;
            min-height: 40px;
        }

        .form-box {
            max-width: 760px;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .field textarea {
            min-height: 110px;
            resize: vertical;
        }

        .readonly-box {
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f9fafb;
            font-size: 14px;
        }

        tr:hover td {
            background: #fcfcfd;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: bold;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-info {
            background: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <h1>Hospital Management System</h1>
            <p>DBMS Project Dashboard</p>
        </div>

        <div class="top-actions">
            <span class="pill">Role: {{ session.get('role', 'GUEST') }}</span>
            <span class="pill">User: {{ session.get('username', 'Guest') }}</span>

            <a class="btn btn-light" href="{{ url_for('home') }}">Dashboard</a>
            <a class="btn btn-light" href="{{ url_for('available_doctors') }}">Doctors</a>

            {% if session.get('role') == 'GUEST' %}
                <a class="btn" href="{{ url_for('login') }}">Login</a>
                <a class="btn btn-green" href="{{ url_for('signup') }}">Sign Up</a>
            {% else %}
                <a class="btn btn-red" href="{{ url_for('logout') }}">Logout</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
